# fly.toml app configuration file generated for telegram-ai-bot-ofemda on 2026-05-23T19:04:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'telegram-ai-bot-ofemda'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'

[[mounts]]
  source = 'bot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
